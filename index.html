<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket Annotator — L2 / L3</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f8fa;
      color: #1f2328;
      min-height: 100vh;
      padding: 32px 24px;
    }

    .app { max-width: 820px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
    .row { display: flex; flex-direction: row; align-items: center; }
    .wrap { flex-wrap: wrap; }
    .spacer { flex: 1; }
    hr.divider { border: none; border-top: 1px solid #d0d7de; }

    /* Pills */
    .pill {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 500; line-height: 1;
      white-space: nowrap; user-select: none;
    }
    .pill-info    { background: #dbeafe; color: #1d4ed8; }
    .pill-success { background: #dcfce7; color: #15803d; }
    .pill-warning { background: #fef9c3; color: #854d0e; }
    .pill-danger  { background: #fee2e2; color: #b91c1c; }
    .pill-neutral { background: #f1f5f9; color: #475569; }
    .pill-purple  { background: #ede9fe; color: #6d28d9; }
    .pill-teal    { background: #ccfbf1; color: #0f766e; }
    .pill-indigo  { background: #e0e7ff; color: #3730a3; }
    .pill-orange  { background: #ffedd5; color: #c2410c; }
    .pill-pink    { background: #fce7f3; color: #9d174d; }

    .pill-drag { cursor: grab; border-radius: 999px; transition: opacity 0.1s; }
    .pill-drag:active { cursor: grabbing; }
    .pill-drag.dragging { opacity: 0.3; }

    /* Buttons */
    .btn {
      cursor: pointer; border-radius: 6px; padding: 6px 14px;
      font-size: 13px; font-weight: 500; border: none;
      transition: background 0.1s;
    }
    .btn-primary { background: #1f2328; color: #fff; }
    .btn-primary:hover { background: #32383f; }
    .btn-ghost {
      background: transparent; color: #475569;
      border: 1px solid #d0d7de;
    }
    .btn-ghost:hover { background: #f1f5f9; }

    /* Paste area */
    .paste-area {
      width: 100%; min-height: 140px; resize: vertical;
      padding: 12px 14px; border-radius: 8px;
      border: 1.5px solid #d0d7de; background: #fff;
      font-family: inherit; font-size: 13px; line-height: 1.7;
      color: #1f2328; outline: none;
    }
    .paste-area:focus { border-color: #2563eb; }

    /* Section label */
    .section-label { font-size: 13px; font-weight: 600; color: #1f2328; }

    /* Message line drop zones */
    .msg-line {
      padding: 10px 14px; border-radius: 6px;
      border: 1.5px solid transparent;
      transition: background 0.12s, border-color 0.12s;
    }
    .msg-line.drag-over    { border-color: #2563eb; background: rgba(37,99,235,0.05); }
    .msg-line.has-info     { background: rgba(37,99,235,0.08); }
    .msg-line.has-success  { background: rgba(21,128,61,0.10); }
    .msg-line.has-warning  { background: rgba(133,77,14,0.08); }
    .msg-line.has-danger   { background: rgba(185,28,28,0.08); }
    .msg-line.has-neutral  { background: #f1f5f9; }
    .msg-line.has-purple   { background: rgba(109,40,217,0.07); }
    .msg-line.has-teal     { background: rgba(15,118,110,0.07); }
    .msg-line.has-indigo   { background: rgba(55,48,163,0.07); }
    .msg-line.has-orange   { background: rgba(194,65,12,0.07); }
    .msg-line.has-pink     { background: rgba(157,23,77,0.07); }

    .text-sm { font-size: 13px; line-height: 1.7; }

    .inline-code {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 11px; background: #f1f5f9;
      border: 1px solid #e2e8f0; border-radius: 4px;
      padding: 1px 5px; color: #2563eb;
    }

    .config-block {
      margin: 6px 0 2px; padding: 10px 14px;
      border-radius: 6px; background: #f0f2f5;
      border: 1px solid #e2e8f0;
    }
    .config-row { font-family: "SFMono-Regular", Consolas, monospace; font-size: 12px; line-height: 1.8; }
    .config-key { color: #2563eb; font-weight: 600; }
    .config-val { color: #475569; }

    .tags-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .tag-chip { cursor: pointer; }

    .count-badge {
      font-size: 11px; color: #6b7280;
      background: #f1f5f9; border: 1px solid #e2e8f0;
      border-radius: 999px; padding: 2px 8px;
    }

    .toggle-btn {
      cursor: pointer; background: none;
      border: 1px solid #d0d7de; border-radius: 999px;
      padding: 3px 10px; font-size: 12px; color: #475569;
      opacity: 0.7;
    }
    .toggle-btn:hover { opacity: 1; }

    /* Mode switcher */
    .mode-bar {
      display: flex; align-items: center; gap: 6px;
      background: #f1f5f9; border-radius: 999px;
      padding: 3px; width: fit-content;
    }
    .mode-btn {
      cursor: pointer; border: none; border-radius: 999px;
      padding: 4px 16px; font-size: 12px; font-weight: 600;
      transition: background 0.15s, color 0.15s;
      background: transparent; color: #64748b;
    }
    .mode-btn.active { background: #1f2328; color: #fff; }
    .mode-btn:not(.active):hover { background: #e2e8f0; }

    .mode-label {
      font-size: 11px; font-weight: 500; color: #64748b;
      letter-spacing: 0.04em; text-transform: uppercase;
    }

    /* Tool selector */
    .tool-bar {
      display: flex; align-items: center; gap: 4px;
      background: #f1f5f9; border-radius: 999px;
      padding: 3px; width: fit-content;
    }
    .tool-btn {
      cursor: pointer; border: none; border-radius: 999px;
      padding: 3px 12px; font-size: 11px; font-weight: 600;
      transition: background 0.15s, color 0.15s;
      background: transparent; color: #64748b;
    }
    .tool-btn.active { background: #1f2328; color: #fff; }
    .tool-btn:not(.active):hover { background: #e2e8f0; }
    .tool-hint { font-size: 10px; color: #94a3b8; font-style: italic; }

    /* Prompt output panel */
    .prompt-panel {
      border: 1.5px solid #2563eb; border-radius: 8px;
      background: #f8faff; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .prompt-panel-header {
      display: flex; align-items: center; gap: 8px;
    }
    .prompt-panel-title { font-size: 13px; font-weight: 600; color: #1d4ed8; }
    .prompt-output {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px; line-height: 1.7; white-space: pre-wrap;
      background: #fff; border: 1px solid #dbeafe; border-radius: 6px;
      padding: 12px 14px; color: #1f2328;
    }

    /* Stage buttons */
    .stage-bar {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .stage-btn {
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      border: 1.5px solid #d0d7de;
      background: #fff; color: #475569;
      transition: all 0.15s;
      user-select: none;
    }
    .stage-btn:hover { border-color: #94a3b8; color: #1f2328; background: #f8fafc; }
    .stage-btn.active {
      border-color: #1f2328;
      background: #1f2328;
      color: #fff;
    }
    .stage-num {
      width: 18px; height: 18px; border-radius: 999px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; flex-shrink: 0;
      background: #e2e8f0; color: #64748b;
      transition: background 0.15s, color 0.15s;
    }
    .stage-btn.active .stage-num { background: rgba(255,255,255,0.2); color: #fff; }

    /* Stage panel */
    .stage-panel {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.28s ease, opacity 0.22s ease;
      opacity: 0;
    }
    .stage-panel.open { max-height: 2000px; opacity: 1; }

    .stage-panel-inner {
      border-radius: 10px;
      border: 1.5px solid #d0d7de;
      background: #fff;
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .stage-title {
      font-size: 14px; font-weight: 700; color: #1f2328;
    }

    /* Stage prompt block */
    .stage-prompt-wrap { position: relative; }
    .stage-prompt {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 11.5px; line-height: 1.7; white-space: pre-wrap;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px; padding: 12px 14px;
      color: #1f2328;
    }
    .stage-copy-btn {
      position: absolute; top: 8px; right: 8px;
      cursor: pointer; background: #fff;
      border: 1px solid #d0d7de; border-radius: 6px;
      padding: 3px 10px; font-size: 11px; font-weight: 600;
      color: #475569; transition: background 0.15s;
    }
    .stage-copy-btn:hover { background: #f1f5f9; }
    .prompt-version-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #94a3b8;
      margin: 10px 0 4px 0;
    }

    .light-details {
      margin: 8px 0 4px 0;
    }
    .light-summary {
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: #94a3b8;
      cursor: pointer; user-select: none;
      list-style: none;
      display: flex; align-items: center; gap: 6px;
    }
    .light-summary::-webkit-details-marker { display: none; }
    .light-summary::before {
      content: "▶"; font-size: 9px; transition: transform 0.15s;
    }
    details[open] .light-summary::before { transform: rotate(90deg); }
    .light-hint { font-weight: 400; color: #cbd5e1; text-transform: none; letter-spacing: 0; }

    /* Pillar header colors */
    .pillar { font-weight: 700; }
    .pillar-CONTEXT     { color: #2563eb; }
    .pillar-INSTRUCTIONS { color: #15803d; }
    .pillar-REASONING   { color: #c2410c; }
    .pillar-EXAMPLES     { color: #6d28d9; }
    .pillar-OUTPUT_FORMAT { color: #0f766e; }

  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ── Stage definitions ─────────────────────────────────── */
const L2_STAGES = [
  {
    id: "triage", label: "Kickoff", alias: ";p_s_1",
    color: "#2563eb", bg: "#eff6ff", border: "#bfdbfe",
    canvasVisual: "heatmap — rows=hypotheses, cols=artifacts needed, filled dot=confirmed, empty=needed. All dots start empty.",
    htmlVisual: "heatmap grid table — rows=hypotheses, cols=artifacts. Green cell ●=confirmed, gray cell ○=needed.",
    promptLight: `Restate the customer problem in one sentence.
List 3 hypotheses with a confidence % (max 30% each at this stage).
What artifacts or information do I still need to verify each one?`,
    prompt: `CONTEXT:
I'm a Datadog TSE2 starting a ticket investigation leveraging AI. I'm working in 5 stages: Kickoff, Investigation, Log/Configuration Codebase Correlation, Reproduction, and Escalation.

INSTRUCTIONS:
Using the customer message below, complete in order:
1. Restate the problem in one sentence
2. List all investigation elements: Statement, Evidence, Hypothesis
3. Assign a trust level to each: Customer Claim / Unverified / Speculative / Low / Medium / High
4. Propose 1-3 initial hypotheses with confidence % (max 30% at this stage). Never modify an existing hypothesis — only add new ones, always at a lower confidence than the current highest.
5. List every artifact or piece of information still needed to verify each element, and for each one state why it is required

REASONING:
For each trust level, quote the exact customer wording that justified it, or write "no evidence yet".
Do not include Root Cause or Workaround rows — those are determined in later stages.
Minimum artifact rule: infer artifact candidates from the product area, environment, and symptoms — do not use a fixed list. For each candidate, decide needed or not needed and justify why in one sentence.

EXAMPLES:
| Element | Content | Trust | Justification |
|---------|---------|-------|---------------|
| Statement | [restate the symptom] | Customer Claim | "[exact customer quote]" |
| H1 | [possible cause] | Speculative | no artifact evidence yet |

Artifact decision table:
| Artifact | Needed | Why |
|----------|--------|-----|
| [artifact type] | YES/NO | [one sentence reason] |

OUTPUT FORMAT:
1-sentence problem restatement + elements table + hypotheses with confidence % + artifact decision table.

[PASTE CUSTOMER MESSAGE HERE]`,
  },
  {
    id: "investigation", label: "Investigation", alias: ";p_s_2",
    color: "#15803d", bg: "#f0fdf4", border: "#bbf7d0",
    canvasVisual: "evidence tracker — rows=findings, columns=[Artifact, Quote, Trust before, Trust after, H impact]. rowTone: success=upgraded, danger=refuted, neutral=unchanged.",
    htmlVisual: "evidence table — green row=trust upgraded, red row=refuted, gray=unchanged. Columns: Artifact | Quote | Trust Before | Trust After | H Impact.",
    promptLight: `Review the attached artifacts.
What confirms or refutes each hypothesis from Stage 1? Update confidence %.`,
    prompt: `CONTEXT:
Stage 2 — Investigation. Stage 1 identified initial hypotheses. Artifacts are now available.

INSTRUCTIONS:
Using the artifacts identified in Stage 1, complete in order:
1. Examine the configuration artifact: confirm the customer's claimed settings are present
2. Examine the runtime artifact: confirm the Agent loaded those settings at runtime
3. Note any gap between claimed config and actual loaded config
4. Check official Datadog documentation for explicit mention of the interaction between the relevant settings
5. Update each element's trust level based on direct artifact evidence
6. Update hypothesis confidence %

REASONING:
For each trust level change, quote the exact line from the artifact. Do not change trust without a direct quote.

EXAMPLES:
| Finding | Artifact | Quote | Impact on H1 |
|---------|----------|-------|-------------|
| [what was found] | [artifact name] | "[exact line]" | Supports/Refutes H1 |

OUTPUT FORMAT:
Updated elements table + evidence table + updated hypothesis confidence % + one key finding sentence.

[ATTACH HELM VALUES AND AGENT FLARE]`,
  },
  {
    id: "artefact", label: "Artefact Correlation", alias: ";p_s_3",
    color: "#6d28d9", bg: "#faf5ff", border: "#ddd6fe",
    canvasVisual: "diff view — DiffView of buggy vs fixed lines with file path in CardHeader and DiffStats in trailing slot, one card per file.",
    htmlVisual: "two-column diff — left=buggy config (red highlight on changed lines), right=fixed (green highlight). File path as section header.",
    promptLight: `Search the datadog-agent GitHub repo for the code that implements the relevant behavior.
What does it tell us? Quote the exact file path, line number, and code.`,
    prompt: `CONTEXT:
Stage 3 — Log/Configuration Codebase Correlation. Stage 2 confirmed the configuration. Now correlate findings with the Datadog Agent codebase.

INSTRUCTIONS:
Complete in order:
1. Search the datadog-agent GitHub repository for files that implement the relevant filter logic
2. Find the function or component that defines filter group precedence
3. Use git blame to identify when the behavior changed and which commit introduced it
4. Update hypothesis with code evidence

REASONING:
For each finding, quote the exact file path + line number + code or comment. Do not paraphrase — direct quote only.

EXAMPLES:
| File | Line | Quote | Verdict |
|------|------|-------|---------|
| [file path] | [line] | "[exact code or comment]" | Confirms/Refutes H1 |

OUTPUT FORMAT:
Code evidence table + updated hypothesis confidence % (expected 70-95%) + one-line root cause statement.

[PASTE STAGE 2 FINDINGS HERE]`,
  },
  {
    id: "reproduction", label: "Reproduction", alias: ";p_s_4",
    color: "#c2410c", bg: "#fff7ed", border: "#fed7aa",
    canvasVisual: "timeline — one dot per repro step (rowTone success=pass, danger=fail, neutral=skipped), final row=VERDICT in bold.",
    htmlVisual: "numbered step list — ✓ green=pass, ✗ red=fail per step. VERDICT in large bold at bottom inside green or red bordered box.",
    promptLight: `Reproduce this issue in minikube using the customer's exact configuration.
Show the commands and their output. Confirm pass or fail.`,
    prompt: `CONTEXT:
Stage 4 — Reproduction. The hypothesis is confirmed by codebase evidence. Reproduce the issue in minikube.

INSTRUCTIONS:
Before anything else:
1. Clean minikube — remove all pods and deployments. Do not delete secrets or the cluster itself. Retrieve existing API keys from kubectl secrets and reuse them.
2. Present the full deployment plan (namespaces, pods, Agent config, debug flags) and wait for approval before executing.

Then complete in order:
3. Create namespaces matching the customer environment
4. Deploy simulation pods that produce logs in the target namespace
5. Deploy the Datadog Agent using the exact customer Helm values — do not change any filter setting
6. Confirm the issue is reproduced (logs reaching Datadog despite the exclusion rule)
7. Enable Agent debug logging and capture the filter evaluation output
8. Document each step with the exact command and output

REASONING:
Before each step, verify the configuration matches the customer Helm values exactly. If anything differs, stop and realign before continuing.

EXAMPLES:
"[relevant log line]" → [what it confirms about the hypothesis]

OUTPUT FORMAT:
Deployment plan (presented first, before execution) + step-by-step reproduction log + debug log snippet confirming the behavior + pass/fail verdict.

[PASTE CUSTOMER HELM VALUES HERE]`,
  },
  {
    id: "escalation", label: "Escalation", alias: ";p_s_5",
    color: "#0f766e", bg: "#f0fdfa", border: "#99f6e4",
    canvasVisual: "summary — Root Cause (danger Callout) + Affected versions (Stat cards) + Workaround (success Callout) side by side, evidence table with file:line citations below.",
    htmlVisual: "three side-by-side boxes: Root Cause (red border), Versions (gray border), Workaround (green border). Evidence table with file:line citations below.",
    promptLight: `State the root cause in one sentence.
List the evidence. Draft a Jira escalation ticket with reproduction steps and a workaround.`,
    prompt: `CONTEXT:
Stage 5 — Escalation. Reproduction confirmed the bug. Prepare the escalation package.

INSTRUCTIONS:
Complete in order:
1. State the root cause in one technical sentence
2. List all evidence with artifact references (file + line, flare file, or screenshot)
3. State affected versions (confirmed broken + confirmed fixed)
4. Propose a workaround the customer can apply today
5. Draft a Jira escalation with: summary, reproduction steps, expected vs actual behavior, evidence references, affected versions, workaround

REASONING:
For each claim in the escalation, cite a specific artifact. No claim without direct evidence.

EXAMPLES:
- Root cause: [technical one-sentence description]
- Evidence: [file:line or artifact reference]
- Affected: [version X confirmed broken · version Y confirmed fixed]
- Workaround: [actionable step the customer can take today]

OUTPUT FORMAT:
Root cause / evidence table / affected versions / workaround / Jira draft.

[CUSTOMER ISSUE DESCRIPTION — paste original customer message]
[CONCERN / ISSUE — paste Stage 1 elements table and hypotheses]
[INVESTIGATION — paste Stage 2 artifact findings and trust level updates]
[CODEBASE CORRELATION — paste Stage 3 code evidence and root cause statement]
[REPRODUCTION — paste Stage 4 reproduction log and debug output]`,
  },
];

const L3_STAGES = [
  {
    id: "evaluate", label: "Evaluate", alias: ";p_s_l3_1",
    color: "#2563eb", bg: "#eff6ff", border: "#bfdbfe",
    promptLight: `Read the customer message above.
What is the dominant signal? What is the risk level: Low / Medium / High?`,
    prompt: `CONTEXT:
You are a Datadog TSE2 evaluating a customer message before writing a response.
The annotated message above is your input.

INSTRUCTIONS:
1. Identify the dominant signal in the message (Sentiment / Urgency / Business Impact / Unmet Expectation / Escalation Signal).
2. State which signals led you to your risk assessment.
3. Rate the overall risk level: Low / Medium / High.
4. If risk is Medium or High: state whether stakeholder involvement is needed and the single reason that tipped the decision.

EXAMPLES:
Dominant signal: Escalation Signal
Reasoning: Customer explicitly mentions involving their AE and references 2 weeks of no progress.
Risk level: High
Stakeholder involvement: Yes — customer has stated intent to escalate to their AE.

REASONING:
Before rating risk, identify every signal present — do not anchor on the most obvious one.
A message can carry Urgency without Escalation Signal, or Negative Sentiment without Business Impact.
State each signal you detected before assigning a risk level.

OUTPUT FORMAT:
- Dominant signal
- One-sentence reasoning
- Risk level (Low / Medium / High)
- Stakeholder decision (only if risk is Medium or High)`,
  },
  {
    id: "draft", label: "Draft", alias: ";p_s_l3_2",
    color: "#6d28d9", bg: "#faf5ff", border: "#ddd6fe",
    promptLight: `Write a response to the customer message above.
Be professional, empathetic, and direct. Address each concern in priority order. No filler phrases.`,
    prompt: `CONTEXT:
You are a Datadog TSE2 writing a customer-facing response on behalf of the support team.
The customer is reaching out via an async support ticket. Your team operates async-first;
phone/video calls require TL approval. The annotated message and risk assessment from the
previous steps are your context.

INSTRUCTIONS:
1. List the key points from the customer message that must be addressed, in priority order.
2. For each key point, identify the appropriate response action: acknowledge / clarify / commit / redirect.
3. State your assumption about the customer's current emotional state and how the tone should reflect it.
4. Draft the response covering all key points — one paragraph per key point.

EXAMPLES:
Well-structured key point:
  "Customer mentions 2 weeks without progress -> acknowledge (own the delay) + commit (concrete next step with a date)"
Tone to avoid:
  "As per my previous email", "Please don't hesitate to reach out", "I hope this email finds you well"

REASONING:
Before drafting, state what the customer needs most right now and how that shapes the tone
of the response.

OUTPUT:
- Key points list (numbered, with action label per point)
- Response draft (one paragraph per point, professional and empathetic)`,
  },
  {
    id: "criticize", label: "Criticize", alias: ";p_s_l3_3",
    color: "#c2410c", bg: "#fff7ed", border: "#fed7aa",
    promptLight: `Review the response draft above.
What signal is missing? Any filler phrases? What is the single best edit?`,
    prompt: `CONTEXT:
You are a Datadog TSE2 reviewing a response draft before sending.
The draft above and the annotated customer message are your inputs.

INSTRUCTIONS:
1. Check that every signal identified in the annotation is addressed — flag any gap.
2. Scan for filler phrases ("as per", "please don't hesitate", "I hope this finds you well") and suggest direct replacements.
3. Check the opening sentence: does it lead with empathy before technical content? If the dominant signal was Negative Sentiment or Urgency, it should.
4. Propose the single most impactful edit to the draft.

EXAMPLES:
Signal gap: "Escalation Signal detected in annotation but no explicit acknowledgment of escalation path in draft."
Filler phrase: "Please don't hesitate to reach out" → "Reply here and I will get back to you within [time]."
Opening sentence: "Opens with technical content — should open with empathy given Negative Sentiment signal."

REASONING:
Before proposing any edit, check signal coverage first.
A draft that misses a signal is worse than one with filler phrases.
The single most impactful edit is the one that closes the largest signal gap or removes the most damaging filler.

OUTPUT FORMAT:
- Signal coverage (addressed / missing per signal)
- Filler phrases found (original → suggested replacement)
- Opening sentence verdict
- One concrete edit`,
  },
];

const STAGES_BY_MODE = { L2: L2_STAGES, L3: L3_STAGES };

/* ── Elements by mode ──────────────────────────────────── */
const L2_ELEMENTS = [
  { id: "statement",  label: "Statement",    tone: "info" },
  { id: "evidence",   label: "Evidence",     tone: "success" },
  { id: "hypothesis", label: "Hypothesis",   tone: "warning" },
  { id: "missing",    label: "Missing Info", tone: "neutral" },
  { id: "root_cause", label: "Root Cause",   tone: "danger" },
  { id: "next_step",  label: "Next Step",    tone: "info" },
];

const L3_ELEMENTS = [
  { id: "sentiment",  label: "Sentiment",         tone: "danger" },
  { id: "unmet",      label: "Unmet Expectation", tone: "warning" },
  { id: "impact",     label: "Impact",            tone: "danger" },
  { id: "timeline",   label: "Timeline Pressure", tone: "warning" },
  { id: "escalation", label: "Escalation Signal", tone: "neutral" },
  { id: "positive",   label: "Positive Signal",   tone: "success" },
];

const ELEMENTS_BY_MODE = { L2: L2_ELEMENTS, L3: L3_ELEMENTS };

/* ── Prompt block generator ────────────────────────────── */
function lineText(line) {
  if (line.type === "text")       return line.text;
  if (line.type === "code")       return line.rows.join("\n");
  if (line.type === "intro-code") return line.intro + "\n" + line.rows.join("\n");
  return "";
}

function generatePromptBlock(lines, tags, elements) {
  const entries = [];
  for (const line of lines) {
    const lineTags = tags[line.id] ?? [];
    const text = lineText(line);
    if (lineTags.length === 0) {
      entries.push({ labels: [], text });
    } else {
      const labels = [...new Set(lineTags.map(t => {
        const el = elements.find(e => e.id === t.elementId);
        return el ? el.label.toUpperCase() : null;
      }).filter(Boolean))];
      entries.push({ labels, text });
    }
  }

  const out = ["## Customer Message (annotated)", ""];
  for (const { labels, text } of entries) {
    if (labels.length === 0) {
      const indent = " ".repeat("[UNLABELED] ".length);
      out.push(`[UNLABELED] ${text.replace(/\n/g, "\n" + indent)}`);
    } else {
      const tag = labels.join(" / ");
      const indent = " ".repeat(tag.length + 3);
      out.push(`[${tag}] ${text.replace(/\n/g, "\n" + indent)}`);
    }
  }

  const allLabels = [...new Set(entries.flatMap(e => e.labels))];
  out.push("", "---", `Labels used: ${allLabels.join(" · ") || "none"}`);
  return out.join("\n");
}

/* ── Text parser ───────────────────────────────────────── */
const CONFIG_RE = /^[\w]+\s*:/;

function parseText(raw) {
  const paragraphs = raw.split(/\n{2,}/g).map(p => p.trim()).filter(Boolean);
  const lines = [];
  let id = 0;
  for (const para of paragraphs) {
    const rows = para.split("\n").map(r => r.trim()).filter(Boolean);
    if (rows.every(r => CONFIG_RE.test(r))) {
      lines.push({ id: `l${++id}`, type: "code", rows });
    } else if (rows.length > 1 && rows.slice(1).every(r => CONFIG_RE.test(r))) {
      lines.push({ id: `l${++id}`, type: "intro-code", intro: rows[0], rows: rows.slice(1) });
    } else {
      lines.push({ id: `l${++id}`, type: "text", text: para.replace(/\n/g, " ") });
    }
  }
  return lines;
}

function renderInline(text) {
  return text.split(/(`[^`]+`)/g).map((part, i) =>
    part.startsWith("`") && part.endsWith("`")
      ? <code key={i} className="inline-code">{part.slice(1, -1)}</code>
      : <span key={i}>{part}</span>
  );
}

function ConfigRows({ rows }) {
  return (
    <div className="config-block">
      {rows.map((row, i) => {
        const ci = row.indexOf(":");
        return (
          <div key={i} className="config-row">
            <span className="config-key">{row.slice(0, ci)}</span>
            <span className="config-val">{row.slice(ci)}</span>
          </div>
        );
      })}
    </div>
  );
}

let _uid = 0;
const nextUid = () => ++_uid;

const L2_DEFAULT_TEXT = `Our requirement is to exclude containers of all namespaces and include only \`ig1\` and \`ncc-operators\` namespace in a Kubernetes cluster.

Additionally, from the \`ig1\` namespace, we want to exclude logs from the \`istio-proxy\` container from being sent to the Datadog UI.

Hence, we have used the below configuration to meet our requirement.
containerExclude: kube_namespace:.*
containerInclude: kube_namespace:ig1 kube_namespace:ncc-operators
containerExcludeLogs: name:^istio-proxy$

But still we are seeing logs of container name \`istio-proxy\` in Datadog UI.

Please help us with correct configuration to exclude logs of container \`istio-proxy\` which is under namespace.`;

const L3_DEFAULT_TEXT = `I am extremely disappointed with the level of support we have received. It has been over 2 weeks since we reported that our Datadog dashboards are showing incorrect host counts, and we believe we are being overbilled as a result.

Despite multiple follow-ups, we have not received a concrete resolution or even an acknowledgment of the root cause. Our team has provided all requested flares, logs, and configuration details on day one.

The responses we receive are generic and do not reflect that anyone has actually reviewed our data. We asked for a timeline last week and received no answer.

We are a P1 enterprise customer and this level of service is not acceptable. We are now considering escalating this to our account executive.`;

const DEFAULT_TEXTS = { L2: L2_DEFAULT_TEXT, L3: L3_DEFAULT_TEXT };

const PILLARS = ["CONTEXT", "INSTRUCTIONS", "REASONING", "EXAMPLES", "OUTPUT FORMAT"];

function renderPrompt(text) {
  return text.split("\n").map((line, i, arr) => {
    const m = line.match(/^([A-Z][A-Z ]+):$/);
    if (m && PILLARS.includes(m[1])) {
      const cls = m[1].replace(/\s+/g, "_");
      return (
        <span key={i} className={`pillar pillar-${cls}`}>{line}{i < arr.length - 1 ? "\n" : ""}</span>
      );
    }
    return <span key={i}>{line}{i < arr.length - 1 ? "\n" : ""}</span>;
  });
}

function getInitialStage() {
  try {
    const p = new URLSearchParams(window.location.search).get("stage");
    const allStages = [...L2_STAGES, ...L3_STAGES];
    if (p && allStages.find(s => s.id === p)) return p;
  } catch (_) {}
  return null;
}

/* ── Workshop routing blocks ──────────────────────────── */
function canvasRoutingBlock(stageNum, visual) {
  return `WORKSHOP MODE — canvas only, no chat output.
Rules for this session:
- Do NOT output the analysis in chat. All content goes in the canvas file only.
- In chat, respond only with: "Canvas ready — open stage-${stageNum}.canvas.tsx"
- Canvas target: fits on a single screen, max 3 bullet points per section, max 4 table rows, one bold takeaway line at the bottom.

Canvas: create a Cursor canvas at ~/.cursor/projects/Users-alexandre-vea-Projects-TSE/canvases/stage-${stageNum}.canvas.tsx
Visual: ${visual}

Canvas hard rules — must follow exactly:
- No hardcoded hex colors. Only useHostTheme() tokens (call it inside every component that needs it).
- Valid token paths: theme.accent.primary · theme.fill.primary/secondary/tertiary/quaternary  theme.stroke.primary/secondary/tertiary · theme.text.primary/secondary/tertiary/onAccent  theme.bg.editor/chrome/elevated · theme.diff.stripAdded (green) · theme.diff.stripRemoved (red)
- Table rowTone valid values only: "success" | "danger" | "warning" | "info" | "neutral" — never "pass" or "fail"
- Pill tone valid values only: "neutral" | "added" | "deleted" | "renamed" | "success" | "warning" | "info"
- No box-shadow, no gradients, no emoji as decoration, no hardcoded font sizes above 24px.

---
`;
}

function htmlRoutingBlock(stageNum, visual) {
  return `WORKSHOP MODE — HTML file only, no chat output.
Rules:
- Write a single self-contained HTML file to ~/Desktop/workshop/stage-${stageNum}.html
- After writing, run: open ~/Desktop/workshop/stage-${stageNum}.html
- In chat respond only with: "Stage ${stageNum} ready — check Chrome"
- Single screen layout, max 3 bullets per section, max 4 table rows, one bold takeaway at bottom

Visual: ${visual}

HTML hard rules:
- Self-contained: inline CSS only, no external dependencies
- Colors: white background, dark text, green=#22c55e red=#ef4444 amber=#f59e0b gray=#94a3b8
- Tables: alternating row shading (#f8fafc), colored row left-border for status
- Font: system-ui, 13px body, bold section headers

---
`;
}

/* ── App ───────────────────────────────────────────────── */
function App() {
  const urlMode = new URLSearchParams(window.location.search).get("mode");
  const lockedMode = (urlMode === "L2" || urlMode === "L3") ? urlMode : null;
  const initialMode = lockedMode ?? "L2";

  const [mode, setMode]               = useState(initialMode);
  const [raw, setRaw]                 = useState(DEFAULT_TEXTS[initialMode]);
  const [lines, setLines]             = useState(() => parseText(DEFAULT_TEXTS[initialMode]));
  const [editing, setEditing]         = useState(false);
  const [tags, setTags]               = useState({});
  const [dragging, setDragging]       = useState(null);
  const [over, setOver]               = useState(null);
  const [paletteOpen, setPaletteOpen] = useState(false);
  const [promptBlock, setPromptBlock] = useState(null);
  const [copied, setCopied]           = useState(false);
  const [activeStage, setActiveStage]   = useState(getInitialStage);
  const [copiedStage, setCopiedStage]   = useState(null);
  const [tool, setTool]                 = useState("cursor"); // "cursor" | "claude"

  const ELEMENTS = ELEMENTS_BY_MODE[mode];
  const STAGES   = STAGES_BY_MODE[mode];

  function switchMode(m) {
    if (m === mode) return;
    const text = DEFAULT_TEXTS[m];
    setMode(m); setRaw(text); setLines(parseText(text));
    setTags({}); setPromptBlock(null); setEditing(false);
  }

  function toggleStage(id) {
    setActiveStage(prev => prev === id ? null : id);
  }

  function copyPrompt(stage) {
    const stageIndex = STAGES.indexOf(stage);
    let text = stage.prompt;
    if (mode === "L2" && stage.canvasVisual) {
      const routing = tool === "cursor"
        ? canvasRoutingBlock(stageIndex + 1, stage.canvasVisual)
        : htmlRoutingBlock(stageIndex + 1, stage.htmlVisual);
      text = routing + text;
    }
    navigator.clipboard.writeText(text).then(() => {
      setCopiedStage(stage.id);
      setTimeout(() => setCopiedStage(null), 2000);
    });
  }

  function handleGenerate() {
    setPromptBlock(generatePromptBlock(lines, tags, ELEMENTS));
    setCopied(false);
  }

  function handleCopyPrompt(text) {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  }

  function loadMessage() {
    setLines(parseText(raw)); setTags({}); setEditing(false);
  }

  function onDrop(lineId) {
    if (!dragging) return;
    setTags(prev => ({
      ...prev,
      [lineId]: [...(prev[lineId] ?? []), { uid: nextUid(), elementId: dragging }],
    }));
    setDragging(null); setOver(null);
  }

  function removeTag(lineId, uid) {
    setTags(prev => ({
      ...prev,
      [lineId]: (prev[lineId] ?? []).filter(t => t.uid !== uid),
    }));
  }

  const totalTags = Object.values(tags).flat().length;

  return (
    <div className="app">

      {/* ── Mode switcher (hidden when ?mode= param locks the mode) ── */}
      <div className="row" style={{ gap: 10 }}>
        {!lockedMode && (
          <div className="mode-bar">
            <button className={`mode-btn${mode === "L2" ? " active" : ""}`} onClick={() => switchMode("L2")}>L2</button>
            <button className={`mode-btn${mode === "L3" ? " active" : ""}`} onClick={() => switchMode("L3")}>L3</button>
          </div>
        )}
        <span className="mode-label">{mode === "L2" ? "Technical Ticket Annotation" : "Customer-Facing Response"}</span>
      </div>

      {/* ── Editing panel ── */}
      {editing ? (
        <>
          <textarea
            className="paste-area"
            value={raw}
            onChange={e => setRaw(e.target.value)}
            placeholder="Paste the customer message here…"
          />
          <div className="row" style={{ gap: 8 }}>
            <button className="btn btn-primary" onClick={loadMessage}>Load message</button>
            <button className="btn btn-ghost" onClick={() => setEditing(false)}>Cancel</button>
          </div>
        </>
      ) : (
        <>
          {/* Palette */}
          <div className="row wrap" style={{ gap: 8 }}>
            {paletteOpen && ELEMENTS.map(el => (
              <div
                key={el.id}
                className={`pill-drag${dragging === el.id ? " dragging" : ""}`}
                draggable
                onDragStart={() => setDragging(el.id)}
                onDragEnd={() => { setDragging(null); setOver(null); }}
              >
                <span className={`pill pill-${el.tone}`}>{el.label}</span>
              </div>
            ))}
            <div className="spacer" />
            {totalTags > 0 && (
              <span className="count-badge">{totalTags} label{totalTags !== 1 ? "s" : ""}</span>
            )}
            <button className="toggle-btn" onClick={() => setPaletteOpen(p => !p)}>
              {paletteOpen ? "Hide labels" : "Show labels"}
            </button>
            <button className="toggle-btn" onClick={() => setEditing(true)}>Change message</button>
            {totalTags > 0 && (
              <button className="btn btn-primary" style={{ fontSize: 12, padding: "4px 12px" }} onClick={handleGenerate}>
                Generate prompt block
              </button>
            )}
          </div>

          <hr className="divider" />
          <span className="section-label">Customer Message</span>

          {/* Drop zones */}
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            {lines.map(line => {
              const lineTags = tags[line.id] ?? [];
              const isOver   = over === line.id;
              const topEl    = lineTags[0] ? ELEMENTS.find(e => e.id === lineTags[0].elementId) : null;
              const toneClass = topEl && !isOver ? `has-${topEl.tone}` : "";

              return (
                <div
                  key={line.id}
                  className={`msg-line${isOver ? " drag-over" : ""}${toneClass ? " " + toneClass : ""}`}
                  onDragOver={e => { e.preventDefault(); setOver(line.id); }}
                  onDragLeave={() => setOver(null)}
                  onDrop={() => onDrop(line.id)}
                >
                  {line.type === "text" && (
                    <p className="text-sm">{renderInline(line.text)}</p>
                  )}
                  {line.type === "code" && <ConfigRows rows={line.rows} />}
                  {line.type === "intro-code" && (
                    <>
                      <p className="text-sm" style={{ marginBottom: 4 }}>{renderInline(line.intro)}</p>
                      <ConfigRows rows={line.rows} />
                    </>
                  )}
                  {lineTags.length > 0 && (
                    <div className="tags-row">
                      {lineTags.map(tag => {
                        const el = ELEMENTS.find(e => e.id === tag.elementId);
                        if (!el) return null;
                        return (
                          <span
                            key={tag.uid}
                            className={`pill pill-${el.tone} tag-chip`}
                            title="Click to remove"
                            onClick={() => removeTag(line.id, tag.uid)}
                          >
                            {el.label} ×
                          </span>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* ── Stage buttons + panels ── */}
          <hr className="divider" />
          {mode === "L2" && (
            <div className="row" style={{ gap: 10, marginBottom: 6 }}>
              <div className="tool-bar">
                <button className={`tool-btn${tool === "cursor" ? " active" : ""}`} onClick={() => setTool("cursor")}>⬡ Cursor Canvas</button>
                <button className={`tool-btn${tool === "claude" ? " active" : ""}`} onClick={() => setTool("claude")}>◈ Claude HTML</button>
              </div>
              <span className="tool-hint">Complete prompts include {tool === "cursor" ? "Cursor canvas routing" : "Claude HTML routing"}</span>
            </div>
          )}
          <div className="stage-bar">
            {STAGES.map((stage, i) => (
              <button
                key={stage.id}
                className={`stage-btn${activeStage === stage.id ? " active" : ""}`}
                onClick={() => toggleStage(stage.id)}
              >
                <span className="stage-num">{i + 1}</span>
                {stage.label}
              </button>
            ))}
          </div>

          {STAGES.map(stage => (
              <div key={stage.id} className={`stage-panel${activeStage === stage.id ? " open" : ""}`}>
                <div className="stage-panel-inner">
                  <div className="stage-title">
                    Stage {STAGES.indexOf(stage) + 1} — {stage.label}
                  </div>
                  {stage.promptLight && (
                    <details className="light-details">
                      <summary className="light-summary">Light version <span className="light-hint">(expand)</span></summary>
                      <div className="stage-prompt-wrap" style={{ marginTop: 8 }}>
                        <pre className="stage-prompt">{stage.promptLight}</pre>
                        <button
                          className="stage-copy-btn"
                          onClick={() => { navigator.clipboard.writeText(stage.promptLight); setCopiedStage(stage.id + "_light"); setTimeout(() => setCopiedStage(null), 2000); }}
                        >
                          {copiedStage === stage.id + "_light" ? "Copied!" : "Copy"}
                        </button>
                      </div>
                    </details>
                  )}
                  {stage.promptLight && (
                    <div className="prompt-version-label">
                      Complete version{mode === "L2" && stage.canvasVisual ? ` — ${tool === "cursor" ? "Cursor Canvas" : "Claude HTML"}` : ""}
                    </div>
                  )}
                  <div className="stage-prompt-wrap">
                    <pre className="stage-prompt">{renderPrompt(stage.prompt)}</pre>
                    <button
                      className="stage-copy-btn"
                      onClick={() => copyPrompt(stage)}
                    >
                      {copiedStage === stage.id ? "Copied!" : "Copy"}
                    </button>
                  </div>
                </div>
              </div>
          ))}

          {/* Prompt block output */}
          {promptBlock && (
            <>
              <hr className="divider" />
              <div className="prompt-panel">
                <div className="prompt-panel-header">
                  <span className="prompt-panel-title">Annotated prompt block</span>
                  <div className="spacer" />
                  <button
                    className="btn btn-ghost"
                    style={{ fontSize: 12, padding: "4px 12px", marginLeft: 8 }}
                    onClick={() => handleCopyPrompt(promptBlock)}
                  >
                    {copied ? "Copied!" : "Copy"}
                  </button>
                  <button className="toggle-btn" style={{ marginLeft: 4 }} onClick={() => setPromptBlock(null)}>
                    ✕
                  </button>
                </div>
                <pre className="prompt-output">{promptBlock}</pre>
              </div>
            </>
          )}
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
