<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket Annotator — L2 Investigation</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f8fa;
      color: #1f2328;
      min-height: 100vh;
      padding: 32px 24px;
    }

    .app { max-width: 980px; margin: 0 auto; display: flex; flex-direction: row; align-items: flex-start; }

    /* Sidebar */
    .sidebar {
      width: 148px; flex-shrink: 0;
      display: flex; flex-direction: column; gap: 2px;
      padding: 0 10px 32px 0;
      position: sticky; top: 32px;
      transition: width 0.18s ease, padding 0.18s ease;
      overflow: hidden;
    }
    .sidebar.collapsed { width: 40px; padding: 0 4px 32px 0; }
    .sidebar-header {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #94a3b8;
      padding: 2px 12px 10px 12px;
      white-space: nowrap;
    }
    .sidebar.collapsed .sidebar-header { display: none; }
    .sidebar-toggle {
      cursor: pointer; border: none; background: transparent;
      color: #94a3b8; padding: 4px 6px; border-radius: 4px;
      font-size: 13px; line-height: 1; margin-bottom: 4px;
      align-self: flex-start; transition: color 0.12s;
    }
    .sidebar-toggle:hover { color: #475569; }
    .sidebar-stage {
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      padding: 7px 12px; border: none; background: transparent;
      border-radius: 6px; text-align: left; width: 100%;
      transition: background 0.12s; border-left: 3px solid transparent;
    }
    .sidebar.collapsed .sidebar-stage {
      padding: 7px 0; justify-content: center; border-left: none;
    }
    .sidebar-stage:hover { background: #f1f5f9; }
    .sidebar-stage.active { background: #eff6ff; border-left-color: #2563eb; }
    .sidebar.collapsed .sidebar-stage.active { background: transparent; border-left: none; }
    .sidebar-num {
      width: 22px; height: 22px; border-radius: 999px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; flex-shrink: 0;
      background: #e2e8f0; color: #64748b;
      transition: background 0.12s, color 0.12s;
    }
    .sidebar-stage.active .sidebar-num { background: #2563eb; color: #fff; }
    .sidebar-label {
      font-size: 12px; font-weight: 500; color: #64748b; line-height: 1.3;
      white-space: nowrap;
    }
    .sidebar.collapsed .sidebar-label { display: none; }
    .sidebar-stage.active .sidebar-label { color: #1d4ed8; font-weight: 600; }

    /* Prep panel */
    .prep-panel {
      border: 1.5px solid #8b5cf6; border-radius: 10px;
      background: #faf5ff; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .prep-panel-title { font-size: 14px; font-weight: 700; color: #5b21b6; }
    .prep-hint { font-size: 12px; color: #6d28d9; line-height: 1.5; }
    .prep-block {
      display: flex; flex-direction: column; gap: 8px;
    }
    .prep-block-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: #7c3aed;
    }
    .prep-routing {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 11px; line-height: 1.65; white-space: pre-wrap;
      background: #fff; border: 1px solid #ddd6fe; border-radius: 6px;
      padding: 12px 14px; color: #1f2328; position: relative;
    }
    .prep-copy-btn {
      cursor: pointer; background: #7c3aed; color: #fff;
      border: none; border-radius: 6px;
      padding: 5px 14px; font-size: 11px; font-weight: 700;
      align-self: flex-start; transition: background 0.15s;
    }
    .prep-copy-btn:hover { background: #5b21b6; }

    /* Main area */
    .main {
      flex: 1; min-width: 0; padding-left: 20px;
      border-left: 1px solid #e2e8f0;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* Stage checklist */
    .checklist {
      display: flex; flex-direction: column; gap: 5px;
      padding: 10px 14px;
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
    }
    .checklist-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: #94a3b8; margin-bottom: 2px;
    }
    .checklist-item {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 12px; color: #475569; line-height: 1.5;
    }
    .checklist-dot {
      width: 5px; height: 5px; border-radius: 999px;
      background: #cbd5e1; flex-shrink: 0; margin-top: 6px;
    }
    .hint-toggle { margin-left: 13px; margin-top: 3px; }
    .hint-toggle summary {
      font-size: 10px; font-weight: 700; color: #6366f1;
      background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 4px;
      cursor: pointer; list-style: none; display: inline-flex;
      align-items: center; gap: 4px; padding: 2px 8px; user-select: none;
    }
    .hint-toggle summary::-webkit-details-marker { display: none; }
    .hint-toggle summary:hover { background: #e0e7ff; }
    .hint-visual {
      margin-top: 5px; padding: 8px 10px;
      background: #f8fafc; border: 1px solid #e2e8f0;
      border-left: 3px solid #a5b4fc; border-radius: 0 6px 6px 0;
    }

    /* Attachments */
    .attach-section { display: flex; flex-direction: column; gap: 6px; }
    .attach-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: #94a3b8;
    }
    .attach-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .attach-item {
      flex: 1; min-width: 220px;
      border: 1px solid #d0d7de; border-radius: 8px;
      background: #fff; overflow: hidden;
    }
    .attach-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px; background: #f1f5f9;
      border-bottom: 1px solid #e2e8f0;
    }
    .attach-filename {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 11px; font-weight: 600; color: #1f2328;
    }
    .attach-tag {
      font-size: 9px; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; padding: 1px 6px; border-radius: 999px;
    }
    .attach-tag-helm  { background: #ede9fe; color: #6d28d9; }
    .attach-tag-flare { background: #dbeafe; color: #1d4ed8; }
    .attach-dl-btn {
      cursor: pointer; background: #1f2328; color: #fff;
      border: none; border-radius: 4px;
      padding: 3px 10px; font-size: 10px; font-weight: 700;
      text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
      transition: background 0.12s;
    }
    .attach-dl-btn:hover { background: #32383f; }
    .attach-desc {
      font-size: 11px; color: #64748b; padding: 8px 10px;
      line-height: 1.4;
    }
    .row { display: flex; flex-direction: row; align-items: center; }
    .wrap { flex-wrap: wrap; }
    .spacer { flex: 1; }
    hr.divider { border: none; border-top: 1px solid #d0d7de; }

    /* Pills */
    .pill {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 500; line-height: 1;
      white-space: nowrap; user-select: none;
    }
    .pill-info    { background: #dbeafe; color: #1d4ed8; }
    .pill-success { background: #dcfce7; color: #15803d; }
    .pill-warning { background: #fef9c3; color: #854d0e; }
    .pill-danger  { background: #fee2e2; color: #b91c1c; }
    .pill-neutral { background: #f1f5f9; color: #475569; }
    .pill-purple  { background: #ede9fe; color: #6d28d9; }
    .pill-teal    { background: #ccfbf1; color: #0f766e; }
    .pill-indigo  { background: #e0e7ff; color: #3730a3; }
    .pill-orange  { background: #ffedd5; color: #c2410c; }
    .pill-pink    { background: #fce7f3; color: #9d174d; }

    .pill-drag { cursor: grab; border-radius: 999px; transition: opacity 0.1s; }
    .pill-drag:active { cursor: grabbing; }
    .pill-drag.dragging { opacity: 0.3; }

    /* Buttons */
    .btn {
      cursor: pointer; border-radius: 6px; padding: 6px 14px;
      font-size: 13px; font-weight: 500; border: none;
      transition: background 0.1s;
    }
    .btn-primary { background: #1f2328; color: #fff; }
    .btn-primary:hover { background: #32383f; }
    .btn-ghost {
      background: transparent; color: #475569;
      border: 1px solid #d0d7de;
    }
    .btn-ghost:hover { background: #f1f5f9; }

    /* Paste area */
    .paste-area {
      width: 100%; min-height: 140px; resize: vertical;
      padding: 12px 14px; border-radius: 8px;
      border: 1.5px solid #d0d7de; background: #fff;
      font-family: inherit; font-size: 13px; line-height: 1.7;
      color: #1f2328; outline: none;
    }
    .paste-area:focus { border-color: #2563eb; }

    /* Section label */
    .section-label { font-size: 13px; font-weight: 600; color: #1f2328; }

    /* Message line drop zones */
    .msg-line {
      padding: 10px 14px; border-radius: 6px;
      border: 1.5px solid transparent;
      transition: background 0.12s, border-color 0.12s;
    }
    .msg-line.drag-over    { border-color: #2563eb; background: rgba(37,99,235,0.05); }
    .msg-line.has-info     { background: rgba(37,99,235,0.08); }
    .msg-line.has-success  { background: rgba(21,128,61,0.10); }
    .msg-line.has-warning  { background: rgba(133,77,14,0.08); }
    .msg-line.has-danger   { background: rgba(185,28,28,0.08); }
    .msg-line.has-neutral  { background: #f1f5f9; }
    .msg-line.has-purple   { background: rgba(109,40,217,0.07); }
    .msg-line.has-teal     { background: rgba(15,118,110,0.07); }
    .msg-line.has-indigo   { background: rgba(55,48,163,0.07); }
    .msg-line.has-orange   { background: rgba(194,65,12,0.07); }
    .msg-line.has-pink     { background: rgba(157,23,77,0.07); }

    .text-sm { font-size: 13px; line-height: 1.7; }

    .inline-code {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 11px; background: #f1f5f9;
      border: 1px solid #e2e8f0; border-radius: 4px;
      padding: 1px 5px; color: #2563eb;
    }

    .config-block {
      margin: 6px 0 2px; padding: 10px 14px;
      border-radius: 6px; background: #f0f2f5;
      border: 1px solid #e2e8f0;
    }
    .config-row { font-family: "SFMono-Regular", Consolas, monospace; font-size: 12px; line-height: 1.8; }
    .config-key { color: #2563eb; font-weight: 600; }
    .config-val { color: #475569; }

    .tags-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .tag-chip { cursor: pointer; }

    .count-badge {
      font-size: 11px; color: #6b7280;
      background: #f1f5f9; border: 1px solid #e2e8f0;
      border-radius: 999px; padding: 2px 8px;
    }

    .toggle-btn {
      cursor: pointer; background: none;
      border: 1px solid #d0d7de; border-radius: 999px;
      padding: 3px 10px; font-size: 12px; color: #475569;
      opacity: 0.7;
    }
    .toggle-btn:hover { opacity: 1; }

    /* Mode switcher */
    .mode-bar {
      display: flex; align-items: center; gap: 6px;
      background: #f1f5f9; border-radius: 999px;
      padding: 3px; width: fit-content;
    }
    .mode-btn {
      cursor: pointer; border: none; border-radius: 999px;
      padding: 4px 16px; font-size: 12px; font-weight: 600;
      transition: background 0.15s, color 0.15s;
      background: transparent; color: #64748b;
    }
    .mode-btn.active { background: #1f2328; color: #fff; }
    .mode-btn:not(.active):hover { background: #e2e8f0; }

    .mode-label {
      font-size: 11px; font-weight: 500; color: #64748b;
      letter-spacing: 0.04em; text-transform: uppercase;
    }

    /* Tool selector */
    .tool-bar {
      display: flex; align-items: center; gap: 4px;
      background: #f1f5f9; border-radius: 999px;
      padding: 3px; width: fit-content;
    }
    .tool-btn {
      cursor: pointer; border: none; border-radius: 999px;
      padding: 3px 12px; font-size: 11px; font-weight: 600;
      transition: background 0.15s, color 0.15s;
      background: transparent; color: #64748b;
    }
    .tool-btn.active { background: #1f2328; color: #fff; }
    .tool-btn:not(.active):hover { background: #e2e8f0; }
    .tool-hint { font-size: 10px; color: #94a3b8; font-style: italic; }

    /* Prompt output panel */
    .prompt-panel {
      border: 1.5px solid #2563eb; border-radius: 8px;
      background: #f8faff; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .prompt-panel-header {
      display: flex; align-items: center; gap: 8px;
    }
    .prompt-panel-title { font-size: 13px; font-weight: 600; color: #1d4ed8; }
    .prompt-output {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px; line-height: 1.7; white-space: pre-wrap;
      background: #fff; border: 1px solid #dbeafe; border-radius: 6px;
      padding: 12px 14px; color: #1f2328;
    }

    /* Stage buttons */
    .stage-bar {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .stage-btn {
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      border: 1.5px solid #d0d7de;
      background: #fff; color: #475569;
      transition: all 0.15s;
      user-select: none;
    }
    .stage-btn:hover { border-color: #94a3b8; color: #1f2328; background: #f8fafc; }
    .stage-btn.active {
      border-color: #1f2328;
      background: #1f2328;
      color: #fff;
    }
    .stage-num {
      width: 18px; height: 18px; border-radius: 999px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; flex-shrink: 0;
      background: #e2e8f0; color: #64748b;
      transition: background 0.15s, color 0.15s;
    }
    .stage-btn.active .stage-num { background: rgba(255,255,255,0.2); color: #fff; }

    /* Stage panel */
    .stage-panel {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.28s ease, opacity 0.22s ease;
      opacity: 0;
    }
    .stage-panel.open { max-height: 2000px; opacity: 1; }

    .stage-panel-inner {
      border-radius: 10px;
      border: 1.5px solid #d0d7de;
      background: #fff;
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .stage-title {
      font-size: 14px; font-weight: 700; color: #1f2328;
    }

    /* Stage prompt block */
    .stage-prompt-wrap { position: relative; }
    .stage-prompt {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 11.5px; line-height: 1.7; white-space: pre-wrap;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px; padding: 12px 14px;
      color: #1f2328;
    }
    .stage-copy-btn {
      position: absolute; top: 8px; right: 8px;
      cursor: pointer; background: #fff;
      border: 1px solid #d0d7de; border-radius: 6px;
      padding: 3px 10px; font-size: 11px; font-weight: 600;
      color: #475569; transition: background 0.15s;
    }
    .stage-copy-btn:hover { background: #f1f5f9; }
    .prompt-version-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #94a3b8;
      margin: 10px 0 4px 0;
    }

    .light-details {
      margin: 8px 0 4px 0;
    }
    .light-summary {
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: #94a3b8;
      cursor: pointer; user-select: none;
      list-style: none;
      display: flex; align-items: center; gap: 6px;
    }
    .light-summary::-webkit-details-marker { display: none; }
    .light-summary::before {
      content: "▶"; font-size: 9px; transition: transform 0.15s;
    }
    details[open] .light-summary::before { transform: rotate(90deg); }
    .light-hint { font-weight: 400; color: #cbd5e1; text-transform: none; letter-spacing: 0; }

    /* Pillar header colors */
    .pillar { font-weight: 700; }
    .pillar-CONTEXT     { color: #2563eb; }
    .pillar-INSTRUCTIONS { color: #15803d; }
    .pillar-REASONING   { color: #c2410c; }
    .pillar-EXAMPLES     { color: #6d28d9; }
    .pillar-OUTPUT_FORMAT { color: #0f766e; }

  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function WorkshopModeVisual() {
  const widths = [92,75,100,68,84,55,40,78,62,88];

  const HeatmapPreview = () => {
    const rows = [['H1','●','○','●'],['H2','○','●','○'],['H3','●','●','○']];
    return (
      <div style={{display:'grid',gridTemplateColumns:'18px repeat(3,1fr)',gap:2}}>
        {rows.map((row,i) => row.map((cell,j) => (
          <div key={j} style={{textAlign:'center',padding:'2px',borderRadius:2,fontSize:8,fontWeight:j===0?700:400,
            background:j===0?'transparent':cell==='●'?'#22c55e':'#e2e8f0',
            color:j===0?'#2563eb':cell==='●'?'#fff':'#cbd5e1'}}>{cell}</div>
        )))}
      </div>
    );
  };

  const EvidencePreview = () => (
    <div style={{fontSize:7,fontFamily:'monospace'}}>
      {[['agent.log','↑HIGH','H1 ✓'],['yaml','=MED','—']].map(([a,t,h],i) => (
        <div key={i} style={{display:'flex',gap:3,borderBottom:'1px solid #e2e8f0',padding:'2px 0'}}>
          <span style={{color:'#0891b2',width:38,flexShrink:0,overflow:'hidden'}}>{a}</span>
          <span style={{color:t.startsWith('↑')?'#22c55e':'#f59e0b',width:30,flexShrink:0}}>{t}</span>
          <span style={{color:'#6b7280'}}>{h}</span>
        </div>
      ))}
    </div>
  );

  const DiffPreview = () => (
    <div style={{fontSize:7,fontFamily:'monospace',lineHeight:1.8}}>
      <div style={{background:'#fef2f2',color:'#dc2626',padding:'1px 4px',borderRadius:2}}>- exclude wins over include</div>
      <div style={{background:'#f0fdf4',color:'#16a34a',padding:'1px 4px',borderRadius:2,marginTop:2}}>+ include checked first</div>
    </div>
  );

  const TimelinePreview = () => (
    <div style={{fontSize:7,lineHeight:1.9}}>
      {[['✓','deploy env','#22c55e'],['✓','apply config','#22c55e'],['✗','logs absent','#ef4444']].map(([icon,label,c],i) => (
        <div key={i} style={{display:'flex',alignItems:'center',gap:4}}>
          <span style={{color:c,fontWeight:700}}>{icon}</span>
          <span style={{color:'#6b7280'}}>{label}</span>
        </div>
      ))}
      <div style={{fontWeight:700,color:'#ef4444',marginTop:1,fontSize:8}}>REPRODUCED ✓</div>
    </div>
  );

  const SummaryPreview = () => (
    <div style={{display:'flex',flexDirection:'column',gap:2}}>
      <div style={{background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:3,padding:'2px 5px',fontSize:7,color:'#dc2626',fontWeight:600}}>Root Cause — exclude overrides include</div>
      <div style={{display:'flex',gap:2}}>
        <div style={{flex:1,background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:3,padding:'2px 4px',fontSize:7,color:'#475569'}}>v7.43–7.45 broken</div>
        <div style={{flex:1,background:'#f0fdf4',border:'1px solid #86efac',borderRadius:3,padding:'2px 4px',fontSize:7,color:'#15803d'}}>remove exclude</div>
      </div>
    </div>
  );

  const stages = [
    {n:1,label:'Kickoff',      color:'#2563eb',bg:'#eff6ff',border:'#bfdbfe',visual:'Heatmap',        Preview:HeatmapPreview},
    {n:2,label:'Investigation',color:'#0891b2',bg:'#ecfeff',border:'#a5f3fc',visual:'Evidence table', Preview:EvidencePreview},
    {n:3,label:'Correlation',  color:'#6d28d9',bg:'#faf5ff',border:'#ddd6fe',visual:'Diff view',      Preview:DiffPreview},
    {n:4,label:'Reproduction', color:'#c2410c',bg:'#fff7ed',border:'#fed7aa',visual:'Timeline',       Preview:TimelinePreview},
    {n:5,label:'Escalation',   color:'#15803d',bg:'#f0fdf4',border:'#86efac',visual:'Summary card',   Preview:SummaryPreview},
  ];

  return (
    <div style={{margin:'14px 0'}}>
      <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>

        {/* Left — without routing */}
        <div style={{minWidth:110,background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:9,padding:'10px 12px'}}>
          <div style={{fontSize:9,fontWeight:700,color:'#94a3b8',marginBottom:8,letterSpacing:'0.05em'}}>WITHOUT ROUTING</div>
          {widths.map((w,i) => <div key={i} style={{height:5,background:'#e2e8f0',borderRadius:2,marginBottom:4,width:w+'%'}}/>)}
          <div style={{fontSize:8,color:'#cbd5e1',marginTop:6,fontStyle:'italic',textAlign:'center'}}>wall of markdown in chat</div>

    <div style={{display:'flex',flexDirection:'column',gap:2,fontFamily:'monospace',fontSize:9}}>

  // mini table
  Table: ({rows, cols}) => (

      ))}
    </div>
  ),
};

/* ── Prompt block generator ────────────────────────────── */
function lineText(line) {
  if (line.type === "text")       return line.text;
  if (line.type === "code")       return line.rows.join("\n");
  if (line.type === "intro-code") return line.intro + "\n" + line.rows.join("\n");
  return "";
}

function generatePromptBlock(lines, tags, elements) {
  const entries = [];
  for (const line of lines) {
    const lineTags = tags[line.id] ?? [];
    const text = lineText(line);
    if (lineTags.length === 0) {
      entries.push({ labels: [], text });
    } else {
      const labels = [...new Set(lineTags.map(t => {
        const el = elements.find(e => e.id === t.elementId);
        return el ? el.label.toUpperCase() : null;
      }).filter(Boolean))];
      entries.push({ labels, text });
    }
  }

  const out = ["## Customer Message (annotated)", ""];
  for (const { labels, text } of entries) {
    if (labels.length === 0) {
      const indent = " ".repeat("[UNLABELED] ".length);
      out.push(`[UNLABELED] ${text.replace(/\n/g, "\n" + indent)}`);
    } else {
      const tag = labels.join(" / ");
      const indent = " ".repeat(tag.length + 3);
      out.push(`[${tag}] ${text.replace(/\n/g, "\n" + indent)}`);
    }
  }

  const allLabels = [...new Set(entries.flatMap(e => e.labels))];
  out.push("", "---", `Labels used: ${allLabels.join(" · ") || "none"}`);
  return out.join("\n");
}

/* ── Text parser ───────────────────────────────────────── */
const CONFIG_RE = /^[\w]+\s*:/;

function parseText(raw) {
  const paragraphs = raw.split(/\n{2,}/g).map(p => p.trim()).filter(Boolean);
  const lines = [];
  let id = 0;
  for (const para of paragraphs) {
    const rows = para.split("\n").map(r => r.trim()).filter(Boolean);
    if (rows.every(r => CONFIG_RE.test(r))) {
      lines.push({ id: `l${++id}`, type: "code", rows });
    } else if (rows.length > 1 && rows.slice(1).every(r => CONFIG_RE.test(r))) {
      lines.push({ id: `l${++id}`, type: "intro-code", intro: rows[0], rows: rows.slice(1) });
    } else {
      lines.push({ id: `l${++id}`, type: "text", text: para.replace(/\n/g, " ") });
    }
  }
  return lines;
}

function renderInline(text) {
  return text.split(/(`[^`]+`)/g).map((part, i) =>
    part.startsWith("`") && part.endsWith("`")
      ? <code key={i} className="inline-code">{part.slice(1, -1)}</code>
      : <span key={i}>{part}</span>
  );
}

function ConfigRows({ rows }) {
  return (
    <div className="config-block">
      {rows.map((row, i) => {
        const ci = row.indexOf(":");
        return (
          <div key={i} className="config-row">
            <span className="config-key">{row.slice(0, ci)}</span>
            <span className="config-val">{row.slice(ci)}</span>
          </div>
        );
      })}
    </div>
  );
}

const PILLARS = ["CONTEXT", "INSTRUCTIONS", "REASONING", "EXAMPLES", "OUTPUT FORMAT"];

function renderPrompt(text) {
  return text.split("\n").map((line, i, arr) => {
    const m = line.match(/^([A-Z][A-Z ]+):$/);
    if (m && PILLARS.includes(m[1])) {
      const cls = m[1].replace(/\s+/g, "_");
      return (
        <span key={i} className={`pillar pillar-${cls}`}>{line}{i < arr.length - 1 ? "\n" : ""}</span>
      );
    }
    return <span key={i}>{line}{i < arr.length - 1 ? "\n" : ""}</span>;
  });
}

                          return (
                            <div key={i} style={{display:'flex',flexDirection:'column',gap:0,marginBottom:2}}>
                              <div className="checklist-item" style={{marginBottom:0}}>
                                <span className="checklist-dot" />
                                <span>{step}</span>
                              </div>
                              {hintFn && (
                                <details className="hint-toggle">
                                  <summary>💡 show hint</summary>
                                  <div className="hint-visual">{hintFn()}</div>
                                </details>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {/* Attachments */}
                    {atts && (
                      <div className="attach-section">
                        <div className="attach-section-label">Attachments</div>
                        <div className="attach-row">
                          {atts.map(att => (
                            <div key={att.id} className="attach-item">
                              <div className="attach-header">
                                <span className="attach-filename">{att.filename}</span>
                                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                                  <span className={`attach-tag ${att.tagClass}`}>{att.tag}</span>
                                  <a className="attach-dl-btn" href={att.href} download={att.filename}>
                                    ↓ Download
                                  </a>
                                </div>
                              </div>
                              <div className="attach-desc">{att.desc}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Prompts — hidden by default (reveal after participants attempt) */}
                    <details className="light-details">
                      <summary className="light-summary">Show prompts <span className="light-hint">(reveal after attempt)</span></summary>
                      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 10 }}>
                        {stage.promptLight && (
                          <>
                            <div className="prompt-version-label">Light version</div>
                            <div className="stage-prompt-wrap">
                              <pre className="stage-prompt">{stage.promptLight}</pre>
                              <button className="stage-copy-btn" onClick={() => { navigator.clipboard.writeText(stage.promptLight); setCopiedStage(stage.id + "_light"); setTimeout(() => setCopiedStage(null), 2000); }}>
                                {copiedStage === stage.id + "_light" ? "Copied!" : "Copy"}
                              </button>
                            </div>
                          </>
                        )}
                        <div className="prompt-version-label">Complete version</div>
                        <div className="stage-prompt-wrap">
                          <pre className="stage-prompt">{renderPrompt(stage.prompt)}</pre>
                          <button className="stage-copy-btn" onClick={() => copyPrompt(stage)}>
                            {copiedStage === stage.id ? "Copied!" : "Copy"}
                          </button>
                        </div>
                      </div>
                    </details>
                  </div>
                </>
              );
            })()}

            {/* Prompt block output */}
            {promptBlock && (
              <>
                <hr className="divider" />
                <div className="prompt-panel">
                  <div className="prompt-panel-header">
                    <span className="prompt-panel-title">Annotated prompt block</span>
                    <div className="spacer" />
                    <button className="btn btn-ghost" style={{ fontSize: 12, padding: "4px 12px", marginLeft: 8 }} onClick={() => handleCopyPrompt(promptBlock)}>
                      {copied ? "Copied!" : "Copy"}
                    </button>
                    <button className="toggle-btn" style={{ marginLeft: 4 }} onClick={() => setPromptBlock(null)}>✕</button>
                  </div>
                  <pre className="prompt-output">{promptBlock}</pre>
                </div>
              </>
            )}
          </>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
